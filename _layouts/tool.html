<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
{% if page.mathjax %}<script>MathJax={tex:{displayMath:[['\\[','\\]']],inlineMath:[['\\(','\\)']],tags:'none'},chtml:{scale:1.1}}</script>{% endif %}
<link rel="stylesheet" href="{{ site.baseurl }}/sparking.css">
{% if page.mathjax %}<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>{% endif %}
{% if page.chartjs != false %}<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>{% endif %}
<script src="{{ site.baseurl }}/sparking.js"></script>
<script src="{{ site.baseurl }}/sparking-formulas.js"></script>
</head>
<body data-tool="{{ page.tool_id }}">
{% include nav-tool.html %}
{{ content }}
</body>
</html>
