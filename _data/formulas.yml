eletrot1: |-
  <div class="formula-section-lbl">Lei de Ohm</div>
  <div class="formula-grid" style="margin-bottom:16px">
    <div class="fblock"><div class="fblock-title">Lei de Ohm</div><div class="fmath">\[ I = \frac{V}{R} \]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>V</td><td>Tensão aplicada</td><td>V</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>I</td><td>Corrente</td><td>A</td></tr></table></div>
    <div class="fblock b2"><div class="fblock-title">Por que é uma reta</div><div class="fmath">\[ \frac{dI}{dV} = \frac{1}{R} = \text{cte} \]</div><div class="fvars">A inclinação do gráfico I×V é sempre 1/R — constante para qualquer resistor ôhmico. Desvio da reta indica comportamento não-linear.</div></div>
  </div>
  <div class="formula-section-lbl" style="margin-bottom:10px">Potência</div>
  <div class="formula-grid" style="margin-bottom:16px">
    <div class="fblock"><div class="fblock-title">P × Corrente</div><div class="fmath">\[ P = R \cdot I^2 \]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>P</td><td>Potência dissipada</td><td>W</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>I</td><td>Corrente</td><td>A</td></tr></table><div class="fconst">Duplicar I → P cresce 4× (relação quadrática)</div></div>
    <div class="fblock b2"><div class="fblock-title">P × Tensão</div><div class="fmath">\[ P = \frac{V^2}{R} \]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>P</td><td>Potência dissipada</td><td>W</td></tr><tr><td>V</td><td>Tensão</td><td>V</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr></table><div class="fconst">P = VI = I²R = V²/R — três formas equivalentes</div></div>
  </div>
  <div class="formula-section-lbl" style="margin-bottom:10px">Divisor de Tensão</div>
  <div class="formula-grid" style="margin-bottom:16px">
    <div class="fblock"><div class="fblock-title">Divisor de Tensão</div><div class="fmath">\[ V_{out} = V_s \cdot \frac{R_2}{R_1 + R_2} \]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>Vout</td><td>Tensão na saída</td><td>V</td></tr><tr><td>Vs</td><td>Tensão da fonte</td><td>V</td></tr><tr><td>R1</td><td>Resistência série (fixa)</td><td>Ω</td></tr><tr><td>R2</td><td>Resistência de carga</td><td>Ω</td></tr></table></div>
    <div class="fblock b2"><div class="fblock-title">Casos limite</div><div class="fmath">\[ R_2 = R_1 \Rightarrow V_{out} = \tfrac{V_s}{2} \]</div><div class="fmath">\[ R_2 \to \infty \Rightarrow V_{out} \to V_s \]</div><div class="fconst">R2 = 0 → Vout = 0 V · R2 = R1 → Vout = Vs/2 · R2 → ∞ → Vout → Vs</div></div>
  </div>
  <div class="formula-section-lbl" style="margin-bottom:10px">Potência Máxima</div>
  <div class="formula-grid">
    <div class="fblock"><div class="fblock-title">Potência na carga</div><div class="fmath">\[ P_L = \frac{V_{th}^2 \cdot R_L}{(R_{th} + R_L)^2} \]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>PL</td><td>Potência na carga</td><td>W</td></tr><tr><td>Vth</td><td>Tensão de Thévenin</td><td>V</td></tr><tr><td>Rth</td><td>Resistência de Thévenin</td><td>Ω</td></tr><tr><td>RL</td><td>Resistência de carga</td><td>Ω</td></tr></table><div class="fconst">Pico ocorre quando RL = Rth</div></div>
    <div class="fblock b2"><div class="fblock-title">Máximo de transferência</div><div class="fmath">\[ P_{max} = \frac{V_{th}^2}{4\,R_{th}} \]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>Pmax</td><td>Potência máxima possível</td><td>W</td></tr><tr><td>Vth</td><td>Tensão de Thévenin</td><td>V</td></tr><tr><td>Rth</td><td>Resistência de Thévenin</td><td>Ω</td></tr></table><div class="fconst">Constante 4 = (1+1)² mínimo · Eficiência no pico: η = 50%</div></div>
  </div>

eletrot2: |-
  <div class="fgrid">
    <div class="fcard"><div class="fcard-title">Reatâncias</div><div class="fmath">\[X_L = 2\pi f L\]</div><div class="fmath">\[X_C = \frac{1}{2\pi f C}\]</div><div class="fconst">2π ≈ 6.283</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>X<sub>L</sub></td><td>Reatância indutiva</td><td>Ω</td></tr><tr><td>X<sub>C</sub></td><td>Reatância capacitiva</td><td>Ω</td></tr><tr><td>f</td><td>Frequência</td><td>Hz</td></tr><tr><td>L</td><td>Indutância</td><td>H</td></tr><tr><td>C</td><td>Capacitância</td><td>F</td></tr></table></div>
    <div class="fcard"><div class="fcard-title">Impedância</div><div class="fmath">\[Z = \sqrt{R^2 + (X_L - X_C)^2}\]</div><div class="fmath">\[\varphi = \arctan\!\frac{X_L - X_C}{R}\]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>Z</td><td>Impedância total</td><td>Ω</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>X<sub>L</sub></td><td>Reatância indutiva</td><td>Ω</td></tr><tr><td>X<sub>C</sub></td><td>Reatância capacitiva</td><td>Ω</td></tr><tr><td>φ</td><td>Ângulo de fase</td><td>°</td></tr></table></div>
    <div class="fcard"><div class="fcard-title">Corrente e Tensões</div><div class="fmath">\[I = \frac{V}{Z}\]</div><div class="fvars">\(V_R = RI\)&ensp;·&ensp;\(V_L = X_L I\)&ensp;·&ensp;\(V_C = X_C I\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>I</td><td>Corrente eficaz</td><td>A</td></tr><tr><td>V</td><td>Tensão eficaz</td><td>V</td></tr><tr><td>Z</td><td>Impedância</td><td>Ω</td></tr><tr><td>V<sub>R</sub></td><td>Tensão no resistor</td><td>V</td></tr><tr><td>V<sub>L</sub></td><td>Tensão no indutor</td><td>V</td></tr><tr><td>V<sub>C</sub></td><td>Tensão no capacitor</td><td>V</td></tr></table></div>
    <div class="fcard b2"><div class="fcard-title">Potências</div><div class="fmath">\[P = RI^2\quad Q = XI^2\quad S = ZI^2\]</div><div class="fvars">\(FP = \cos\varphi = P/S\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>P</td><td>Potência ativa</td><td>W</td></tr><tr><td>Q</td><td>Potência reativa</td><td>VAr</td></tr><tr><td>S</td><td>Potência aparente</td><td>VA</td></tr><tr><td>FP</td><td>Fator de potência</td><td>adim</td></tr><tr><td>I</td><td>Corrente eficaz</td><td>A</td></tr></table></div>
    <div class="fcard b2"><div class="fcard-title">Ressonância</div><div class="fmath">\[f_0 = \frac{1}{2\pi\sqrt{LC}}\]</div><div class="fvars">Em \(f_0\): \(Z_{min}=R\), \(I_{max}=V/R\), \(\varphi=0\)</div><div class="fconst">2π ≈ 6.283</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>f<sub>0</sub></td><td>Frequência de ressonância</td><td>Hz</td></tr><tr><td>L</td><td>Indutância</td><td>H</td></tr><tr><td>C</td><td>Capacitância</td><td>F</td></tr></table></div>
    <div class="fcard b3"><div class="fcard-title">Fator de Qualidade</div><div class="fmath">\[Q = \frac{1}{R}\sqrt{\frac{L}{C}} = \frac{f_0}{BW}\]</div><div class="fvars">\(BW = R/(2\pi L)\) Hz</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>Q</td><td>Fator de qualidade</td><td>adim</td></tr><tr><td>f<sub>0</sub></td><td>Frequência de ressonância</td><td>Hz</td></tr><tr><td>BW</td><td>Largura de banda</td><td>Hz</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>L</td><td>Indutância</td><td>H</td></tr><tr><td>C</td><td>Capacitância</td><td>F</td></tr></table></div>
  </div>

circuitos: |-
  <div class="formula-section-lbl">Transitório RC</div>
  <div class="formula-grid">
    <div class="fblock"><div class="fblock-title">Carga</div><div class="fmath">\[ V_C(t) = V_f + (V_0 - V_f)\,e^{-t/\tau} \]</div><div class="fvars">\(\tau = RC\) — constante de tempo</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>V<sub>C</sub></td><td>Tensão no capacitor</td><td>V</td></tr><tr><td>V<sub>f</sub></td><td>Tensão final (regime)</td><td>V</td></tr><tr><td>V<sub>0</sub></td><td>Tensão inicial</td><td>V</td></tr><tr><td>τ</td><td>Constante de tempo RC</td><td>s</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>C</td><td>Capacitância</td><td>F</td></tr></table></div>
    <div class="fblock b2"><div class="fblock-title">Corrente</div><div class="fmath">\[ i(t) = \frac{V_f - V_0}{R}\,e^{-t/\tau} \]</div><div class="fvars">Máxima no instante \(t=0\).</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>i</td><td>Corrente no circuito</td><td>A</td></tr><tr><td>V<sub>f</sub> − V<sub>0</sub></td><td>Variação de tensão</td><td>V</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>τ</td><td>Constante de tempo</td><td>s</td></tr></table></div>
    <div class="fblock b3"><div class="fblock-title">Regime estacionário</div><div class="fmath">\[ t \approx 5\tau \Rightarrow V_C \approx V_f \]</div><div class="fvars">Em \(\tau\): \(V_C = V_f - 0{,}368\,\Delta V\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>τ</td><td>Constante de tempo RC</td><td>s</td></tr><tr><td>5τ</td><td>Tempo de regime (99,3%)</td><td>s</td></tr></table></div>
  </div>
  <div class="formula-section-lbl">Transitório RL</div>
  <div class="formula-grid">
    <div class="fblock"><div class="fblock-title">Corrente</div><div class="fmath">\[ i(t) = I_{ss}\!\left(1 - e^{-t/\tau}\right) \]</div><div class="fvars">\(\tau = L/R\) · \(I_{ss} = V/R\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>i<sub>L</sub></td><td>Corrente no indutor</td><td>A</td></tr><tr><td>I<sub>ss</sub></td><td>Corrente em regime (V/R)</td><td>A</td></tr><tr><td>τ</td><td>Constante de tempo L/R</td><td>s</td></tr><tr><td>L</td><td>Indutância</td><td>H</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr></table></div>
    <div class="fblock b2"><div class="fblock-title">Tensão no indutor</div><div class="fmath">\[ V_L(t) = V\,e^{-t/\tau} \]</div><div class="fvars">Máxima no início, cai a zero em \(5\tau\).</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>V<sub>L</sub></td><td>Tensão no indutor</td><td>V</td></tr><tr><td>V</td><td>Tensão da fonte</td><td>V</td></tr><tr><td>τ</td><td>Constante de tempo L/R</td><td>s</td></tr></table></div>
  </div>
  <div class="formula-section-lbl">Oscilatório RLC</div>
  <div class="formula-grid">
    <div class="fblock"><div class="fblock-title">Parâmetros</div><div class="fmath">\[ \alpha = \frac{R}{2L},\quad \omega_0 = \frac{1}{\sqrt{LC}} \]</div><div class="fvars">\(\zeta = \alpha/\omega_0\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>α</td><td>Taxa de amortecimento</td><td>s⁻¹</td></tr><tr><td>ω<sub>0</sub></td><td>Frequência natural</td><td>rad/s</td></tr><tr><td>ζ</td><td>Coeficiente de amortecimento</td><td>adim</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>L</td><td>Indutância</td><td>H</td></tr><tr><td>C</td><td>Capacitância</td><td>F</td></tr></table></div>
    <div class="fblock b2"><div class="fblock-title">R crítico</div><div class="fmath">\[ R_{crit} = 2\sqrt{L/C} \]</div><div class="fvars">\(\zeta < 1\) sub · \(\zeta = 1\) crit · \(\zeta > 1\) super</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>R<sub>crit</sub></td><td>Resistência crítica</td><td>Ω</td></tr><tr><td>L</td><td>Indutância</td><td>H</td></tr><tr><td>C</td><td>Capacitância</td><td>F</td></tr></table></div>
    <div class="fblock b3"><div class="fblock-title">Freq. amortecida</div><div class="fmath">\[ \omega_d = \omega_0\sqrt{1-\zeta^2} \]</div><div class="fvars">Válido em regime sub-amortecido.</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>ω<sub>d</sub></td><td>Frequência amortecida</td><td>rad/s</td></tr><tr><td>ω<sub>0</sub></td><td>Frequência natural</td><td>rad/s</td></tr><tr><td>ζ</td><td>Coeficiente de amortecimento</td><td>adim</td></tr></table></div>
  </div>
  <div class="formula-section-lbl">Filtros RC</div>
  <div class="formula-grid">
    <div class="fblock"><div class="fblock-title">Passa-Baixa</div><div class="fmath">\[ H_{PB}(f) = \frac{1}{\sqrt{1+(f/f_c)^2}} \]</div><div class="fvars">\(f_c = 1/(2\pi RC)\) · −3 dB em \(f_c\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>H</td><td>Função de transferência</td><td>adim</td></tr><tr><td>f</td><td>Frequência</td><td>Hz</td></tr><tr><td>f<sub>c</sub></td><td>Frequência de corte</td><td>Hz</td></tr><tr><td>R</td><td>Resistência</td><td>Ω</td></tr><tr><td>C</td><td>Capacitância</td><td>F</td></tr></table></div>
    <div class="fblock b2"><div class="fblock-title">Passa-Alta</div><div class="fmath">\[ H_{PA}(f) = \frac{f/f_c}{\sqrt{1+(f/f_c)^2}} \]</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>H</td><td>Função de transferência</td><td>adim</td></tr><tr><td>f</td><td>Frequência</td><td>Hz</td></tr><tr><td>f<sub>c</sub></td><td>Frequência de corte</td><td>Hz</td></tr></table></div>
    <div class="fblock b3"><div class="fblock-title">Decaimento</div><div class="fmath">\[ -20\,\frac{\text{dB}}{\text{dec}}\text{ fora da banda} \]</div><div class="fvars">Filtro RC 1ª ordem — 1 polo.</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>−20 dB/dec</td><td>Taxa de decaimento fora da banda</td><td>dB/década</td></tr></table></div>
  </div>

diodo: |-
  <div class="fgrid">
    <div class="fcard"><div class="fcard-title">Modelo de Shockley</div><div class="fmath">\[I_D = I_S\!\left(e^{V_D/nV_T}-1\right)\]</div><div class="fvars">\(V_T = 26\,\text{mV}\) a 25 °C · \(n\): fator de idealidade (1–2)</div><div class="fconst">V_T ≈ 26 mV a 25 °C</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>I<sub>D</sub></td><td>Corrente no diodo</td><td>A</td></tr><tr><td>I<sub>S</sub></td><td>Corrente de saturação reversa</td><td>A</td></tr><tr><td>V<sub>D</sub></td><td>Tensão no diodo</td><td>V</td></tr><tr><td>n</td><td>Fator de idealidade</td><td>adim</td></tr><tr><td>V<sub>T</sub></td><td>Tensão térmica (≈26 mV a 25°C)</td><td>V</td></tr></table></div>
    <div class="fcard b2"><div class="fcard-title">Reta de Carga</div><div class="fmath">\[I_D = \frac{V_{CC} - V_D}{R}\]</div><div class="fvars">Linha reta de \((0,\, V_{CC}/R)\) até \((V_{CC},\, 0)\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>V<sub>CC</sub></td><td>Tensão de alimentação</td><td>V</td></tr><tr><td>V<sub>D</sub></td><td>Tensão no diodo</td><td>V</td></tr><tr><td>R</td><td>Resistência série</td><td>Ω</td></tr></table></div>
    <div class="fcard"><div class="fcard-title">Ponto Q</div><div class="fmath">\[I_D^{(Q)} = I_S\!\left(e^{V_Q/nV_T}-1\right) = \frac{V_{CC}-V_Q}{R}\]</div><div class="fvars">Resolvido numericamente — intersecção das duas curvas</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>V<sub>Q</sub></td><td>Tensão no ponto Q</td><td>V</td></tr><tr><td>I<sub>D</sub>(Q)</td><td>Corrente no ponto Q</td><td>A</td></tr></table></div>
  </div>

bjt: |-
  <div class="fgrid">
    <div class="fcard"><div class="fcard-title">Região Ativa</div><div class="fmath">\[I_C = \beta I_B(1 + \lambda V_{CE})\]</div><div class="fvars">Efeito Early: inclinação por \(\lambda\) — converge em \(-1/\lambda\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>I<sub>C</sub></td><td>Corrente de coletor</td><td>A</td></tr><tr><td>I<sub>B</sub></td><td>Corrente de base</td><td>A</td></tr><tr><td>β</td><td>Ganho de corrente</td><td>adim</td></tr><tr><td>λ</td><td>Coeficiente de Early</td><td>V⁻¹</td></tr><tr><td>V<sub>CE</sub></td><td>Tensão coletor-emissor</td><td>V</td></tr></table></div>
    <div class="fcard b2"><div class="fcard-title">Reta de Carga DC</div><div class="fmath">\[I_C = \frac{V_{CC} - V_{CE}}{R_C}\]</div><div class="fvars">De \((0,\, V_{CC}/R_C)\) até \((V_{CC},\, 0)\)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>V<sub>CC</sub></td><td>Tensão de alimentação</td><td>V</td></tr><tr><td>R<sub>C</sub></td><td>Resistência de coletor</td><td>Ω</td></tr><tr><td>V<sub>CE</sub></td><td>Tensão coletor-emissor</td><td>V</td></tr></table></div>
    <div class="fcard b3"><div class="fcard-title">Regiões de Operação</div><div class="fvars"><strong>Corte:</strong> I<sub>B</sub> ≈ 0, I<sub>C</sub> ≈ 0<br><strong>Ativa:</strong> I<sub>C</sub> = β I<sub>B</sub> (amplificação)<br><strong>Saturação:</strong> V<sub>CE</sub> &lt; V<sub>CE,sat</sub> ≈ 0,2 V</div></div>
  </div>

retificador: |-
  <div class="fgrid">
    <div class="fcard"><div class="fcard-title">Tensão de pico saída</div><div class="fvars">Vpico = Vm − Vd<br>Vd ≈ 0,7 V (meia onda) · 1,4 V (onda completa)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>Vpico</td><td>Tensão de pico na saída</td><td>V</td></tr><tr><td>Vm</td><td>Tensão de pico da fonte</td><td>V</td></tr><tr><td>Vd</td><td>Queda de tensão no(s) diodo(s)</td><td>V</td></tr></table></div>
    <div class="fcard b2"><div class="fcard-title">Ripple (aprox.)</div><div class="fvars">Meia onda: Vr ≈ Vpico / (f · RL · C)<br>Onda completa: Vr ≈ Vpico / (2f · RL · C)</div><table class="fvars-tbl"><tr><th>Símbolo</th><th>Significado</th><th>Unidade</th></tr><tr><td>Vr</td><td>Ripple pico-pico</td><td>V</td></tr><tr><td>Vpico</td><td>Tensão de pico na saída</td><td>V</td></tr><tr><td>f</td><td>Frequência da rede</td><td>Hz</td></tr><tr><td>RL</td><td>Resistência de carga</td><td>Ω</td></tr><tr><td>C</td><td>Capacitância de filtro</td><td>F</td></tr></table></div>
