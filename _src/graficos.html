---
layout: tool
title: "Construtor de Gráficos"
tool_id: graficos
render_with_liquid: false
---

<div class="hdr">
  <div class="hdr-tag">Ferramenta</div>
  <h1>Gráfico de Experimento</h1>
  <p>Escolha a fórmula, defina condições fixas e registre as medições</p>
</div>

<main>

  <!-- Passo 1: Fórmula -->
  <div class="sec" id="sec-formula">
    <div class="sec-label">1 — Escolha a fórmula</div>
    <div class="formula-grid" id="formula-grid"></div>
  </div>

  <!-- Passo 2: Variáveis -->
  <div class="sec hidden" id="sec-vars">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="sec-label" style="margin-bottom:0;" id="vars-sec-title"></div>
      <button class="btn-link" onclick="resetFormula()">← Trocar</button>
    </div>
    <div class="vars-grid" id="vars-grid"></div>
    <!-- Custom form -->
    <div id="custom-form" class="hidden">
      <div class="sec-label" style="margin-top:14px;">Adicionar coluna</div>
      <div class="custom-add">
        <input class="inp" id="custom-col-name" type="text" placeholder="Nome (ex: Tensão)">
        <input class="inp" id="custom-col-unit" type="text" placeholder="Unidade">
        <button class="btn-sm" onclick="addCustomCol()">+ Adicionar</button>
      </div>
      <div class="custom-col-list" id="custom-col-list"></div>
    </div>
  </div>

  <!-- Passo 3: Eixos -->
  <div class="sec hidden" id="sec-axes">
    <div class="sec-label">2 — Eixos do gráfico</div>
    <div class="axis-row">
      <div class="axis-group">
        <label>Eixo X</label>
        <select id="sel-x" onchange="updateChart()"></select>
      </div>
      <div class="axis-group">
        <label>Eixo Y</label>
        <select id="sel-y" onchange="updateChart()"></select>
      </div>
    </div>
  </div>

  <!-- Gráfico + Tabela -->
  <div class="sec" id="sec-chart">
    <div class="chart-wrap">
      <div class="placeholder" id="chart-placeholder">Escolha uma fórmula para começar</div>
      <canvas id="chart" class="hidden"></canvas>
      <div class="xy-label" id="xy-label"></div>
    </div>
    <div class="table-wrap">
      <table id="data-table">
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <button class="btn-add hidden" id="btn-add-row" onclick="addRow()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Adicionar linha
    </button>
  </div>

</main>

<script>
// ── Formula library ──────────────────────────────────────────────────────────

const FORMULAS = [
  {
    id:'lei-ohm', nome:'Lei de Ohm', expr:'V = R × I', grupo:'Geral',
    vars:[
      {id:'V', nome:'Tensão',     unit:'V'},
      {id:'I', nome:'Corrente',   unit:'A'},
      {id:'R', nome:'Resistência',unit:'Ω', calc:(r)=> num(r.V)&&num(r.I)&&+r.I!==0 ? rd(+r.V/+r.I,4) : ''},
    ],
    dx:'I', dy:'V',
  },
  {
    id:'potencia-dc', nome:'Potência DC', expr:'P = V × I', grupo:'Geral',
    vars:[
      {id:'V', nome:'Tensão',   unit:'V'},
      {id:'I', nome:'Corrente', unit:'A'},
      {id:'P', nome:'Potência', unit:'W', calc:(r)=> num(r.V)&&num(r.I) ? rd(+r.V*+r.I,4) : ''},
    ],
    dx:'I', dy:'P',
  },
  {
    id:'impedancia', nome:'Impedância × Frequência', expr:'Z = V / I', grupo:'Geral',
    vars:[
      {id:'f', nome:'Frequência', unit:'Hz'},
      {id:'V', nome:'Tensão',     unit:'V'},
      {id:'I', nome:'Corrente',   unit:'mA'},
      {id:'Z', nome:'Impedância', unit:'Ω', calc:(r)=> num(r.V)&&num(r.I)&&+r.I!==0 ? rd(+r.V/(+r.I/1000),4) : ''},
    ],
    dx:'f', dy:'Z',
  },
  {
    id:'potencia-ca', nome:'Potência CA', expr:'S = √(P² + Q²)', grupo:'Eletrotécnica',
    vars:[
      {id:'P',  nome:'Pot. Ativa',    unit:'W'},
      {id:'Q',  nome:'Pot. Reativa',  unit:'VAr'},
      {id:'S',  nome:'Pot. Aparente', unit:'VA', calc:(r)=> num(r.P)&&num(r.Q) ? rd(Math.sqrt((+r.P)**2+(+r.Q)**2),2) : ''},
      {id:'FP', nome:'Fator de Pot.', unit:'',   calc:(r)=> num(r.P)&&num(r.Q) ? rd((+r.P)/Math.sqrt((+r.P)**2+(+r.Q)**2),4) : ''},
    ],
    dx:'FP', dy:'P',
  },
  {
    id:'ganho', nome:'Ganho × Frequência', expr:'H_dB = 20·log(Vout/Vin)', grupo:'Eletrônica',
    vars:[
      {id:'f',   nome:'Frequência', unit:'Hz'},
      {id:'Vin', nome:'V entrada',  unit:'V'},
      {id:'Vout',nome:'V saída',    unit:'V'},
      {id:'HdB', nome:'Ganho',      unit:'dB', calc:(r)=> num(r.Vin)&&num(r.Vout)&&+r.Vin!==0 ? rd(20*Math.log10(Math.abs(+r.Vout/+r.Vin)),2) : ''},
    ],
    dx:'f', dy:'HdB',
  },
  {
    id:'diodo', nome:'Curva I×V', expr:'ID × VD', grupo:'Eletrônica',
    vars:[
      {id:'Vd', nome:'Tensão VD',   unit:'V'},
      {id:'Id', nome:'Corrente ID', unit:'mA'},
    ],
    dx:'Vd', dy:'Id',
  },
  {
    id:'rendimento', nome:'Rendimento', expr:'η = Pout / Pin × 100', grupo:'Máquinas',
    vars:[
      {id:'x',   nome:'Carregamento',    unit:'%'},
      {id:'Pin', nome:'Pot. entrada',    unit:'W'},
      {id:'Pout',nome:'Pot. saída',      unit:'W'},
      {id:'eta', nome:'Rendimento η',    unit:'%', calc:(r)=> num(r.Pin)&&num(r.Pout)&&+r.Pin!==0 ? rd(+r.Pout/+r.Pin*100,2) : ''},
    ],
    dx:'x', dy:'eta',
  },
  {
    id:'motor', nome:'Velocidade × Torque', expr:'n × T', grupo:'Máquinas',
    vars:[
      {id:'T', nome:'Torque',     unit:'N·m'},
      {id:'n', nome:'Velocidade', unit:'rpm'},
    ],
    dx:'T', dy:'n',
  },
  {
    id:'custom', nome:'Personalizado', expr:'defina suas colunas', grupo:'',
    vars:[], dx:'', dy:'',
  },
];

// ── State ────────────────────────────────────────────────────────────────────

let formula   = null;
let varModes  = {};   // { id: 'medir' | 'fixar' }
let fixedVals = {};   // { id: string }
let customCols = [];  // [{ id, nome, unit }]
let rows      = [];
let chart     = null;
let mouseListenersAdded = false;

function rd(v, d) { return Math.round(v * 10**d) / 10**d; }
function num(v)   { return v !== '' && v !== undefined && v !== null && !isNaN(+v); }

// ── Build formula grid ───────────────────────────────────────────────────────

function buildFormulaGrid() {
  const grid = document.getElementById('formula-grid');
  const groups = {};
  const order  = [];
  FORMULAS.forEach(f => {
    const g = f.grupo || 'Outro';
    if (!groups[g]) { groups[g] = []; order.push(g); }
    groups[g].push(f);
  });

  let html = '';
  order.forEach(g => {
    html += `<div class="f-group-label">${g}</div>`;
    groups[g].forEach(f => {
      html += `<div class="f-card" id="fc-${f.id}" onclick="selectFormula('${f.id}')">
        <div class="f-nome">${f.nome}</div>
        <div class="f-expr">${f.expr}</div>
      </div>`;
    });
  });
  grid.innerHTML = html;
}

// ── Select formula ───────────────────────────────────────────────────────────

function selectFormula(id) {
  const src = FORMULAS.find(f => f.id === id);
  formula   = { ...src, vars: src.vars.map(v => ({...v})) };
  varModes  = {};
  fixedVals = {};
  customCols = [];
  rows      = [];
  if (id === 'custom') formula.vars = [];

  formula.vars.forEach(v => { varModes[v.id] = 'medir'; });

  document.querySelectorAll('.f-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('fc-'+id).classList.add('selected');

  document.getElementById('vars-sec-title').textContent =
    formula.nome + (formula.expr && formula.id !== 'custom' ? ' — ' + formula.expr : '');
  document.getElementById('sec-vars').classList.remove('hidden');

  buildVarsGrid();
  refreshAxes();
  refreshTable();
  showChartPlaceholder('Preencha dados na tabela para ver o gráfico');
}

function resetFormula() {
  formula = null;
  rows    = [];
  document.getElementById('sec-vars').classList.add('hidden');
  document.getElementById('sec-axes').classList.add('hidden');
  document.getElementById('btn-add-row').classList.add('hidden');
  document.getElementById('table-head').innerHTML = '';
  document.getElementById('table-body').innerHTML = '';
  document.querySelectorAll('.f-card').forEach(c => c.classList.remove('selected'));
  showChartPlaceholder('Escolha uma fórmula para começar');
  if (chart) { chart.destroy(); chart = null; }
}

// ── Var grid ─────────────────────────────────────────────────────────────────

function buildVarsGrid() {
  const grid = document.getElementById('vars-grid');
  const isCustom = formula.id === 'custom';
  document.getElementById('custom-form').classList.toggle('hidden', !isCustom);
  if (isCustom) { grid.innerHTML = ''; return; }

  grid.innerHTML = formula.vars.map(v => {
    if (v.calc) {
      return `<div class="var-row">
        <div class="var-name">${v.nome}</div>
        <div class="var-unit">${v.unit}</div>
        <span class="var-calc-badge">calculado</span>
      </div>`;
    }
    const m = varModes[v.id] || 'medir';
    return `<div class="var-row" id="vr-${v.id}">
      <div class="var-name">${v.nome}</div>
      <div class="var-unit">${v.unit}</div>
      <div class="var-toggle">
        <button id="vbm-${v.id}" class="${m==='medir'?'active':''}" onclick="setMode('${v.id}','medir')">Medir</button>
        <button id="vbf-${v.id}" class="${m==='fixar'?'active':''}" onclick="setMode('${v.id}','fixar')">Fixar</button>
      </div>
      <input class="var-fixed-input${m==='fixar'?'':' hidden'}" id="vfi-${v.id}"
             type="number" step="any" placeholder="Valor" value="${fixedVals[v.id]||''}"
             oninput="fixedVals['${v.id}']=this.value; recalcAll();">
    </div>`;
  }).join('');
}

function setMode(id, mode) {
  varModes[id] = mode;
  document.getElementById('vbm-'+id).classList.toggle('active', mode==='medir');
  document.getElementById('vbf-'+id).classList.toggle('active', mode==='fixar');
  const fi = document.getElementById('vfi-'+id);
  fi.classList.toggle('hidden', mode!=='fixar');
  if (mode==='medir') delete fixedVals[id];
  refreshAxes();
  refreshTable();
}

// ── Custom cols ───────────────────────────────────────────────────────────────

function addCustomCol() {
  const nEl = document.getElementById('custom-col-name');
  const uEl = document.getElementById('custom-col-unit');
  const nome = nEl.value.trim();
  if (!nome) return;
  const id = 'c' + Date.now();
  customCols.push({ id, nome, unit: uEl.value.trim() });
  formula.vars = customCols.map(c => ({ id:c.id, nome:c.nome, unit:c.unit, calc:null }));
  varModes[id] = 'medir';
  nEl.value = ''; uEl.value = '';
  renderCustomList();
  refreshAxes();
  refreshTable();
}

function removeCustomCol(id) {
  customCols = customCols.filter(c => c.id !== id);
  formula.vars = customCols.map(c => ({ id:c.id, nome:c.nome, unit:c.unit, calc:null }));
  delete varModes[id];
  rows = rows.map(r => { const nr = {...r}; delete nr[id]; return nr; });
  renderCustomList();
  refreshAxes();
  refreshTable();
}

function renderCustomList() {
  document.getElementById('custom-col-list').innerHTML = customCols.map(c =>
    `<div class="custom-col-chip">
      ${c.nome}${c.unit ? `<span class="custom-col-unit"> (${c.unit})</span>` : ''}
      <button class="chip-del" onclick="removeCustomCol('${c.id}')">×</button>
    </div>`
  ).join('');
}

// ── Axes ─────────────────────────────────────────────────────────────────────

function getMedirVars() {
  if (!formula) return [];
  return formula.vars.filter(v => v.calc || varModes[v.id] !== 'fixar');
}

function refreshAxes() {
  const mv = getMedirVars();
  const sec = document.getElementById('sec-axes');
  if (mv.length < 2) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');

  const sx = document.getElementById('sel-x');
  const sy = document.getElementById('sel-y');
  const px = sx.value, py = sy.value;

  const opts = mv.map(v => `<option value="${v.id}">${v.nome}${v.unit?' ('+v.unit+')':''}</option>`).join('');
  sx.innerHTML = opts;
  sy.innerHTML = opts;

  sx.value = mv.find(v=>v.id===px) ? px : (formula.dx || mv[0]?.id || '');
  sy.value = mv.find(v=>v.id===py) ? py : (formula.dy || mv[1]?.id || '');
  if (sx.value === sy.value && mv.length > 1)
    sy.value = mv.find(v=>v.id!==sx.value)?.id || sy.value;

  updateChart();
}

// ── Table ─────────────────────────────────────────────────────────────────────

function effRow(row) {
  const e = {};
  formula.vars.forEach(v => {
    e[v.id] = varModes[v.id]==='fixar' && num(fixedVals[v.id]) ? fixedVals[v.id]
              : (row[v.id] !== undefined ? row[v.id] : '');
  });
  return e;
}

function refreshTable() {
  const mv = getMedirVars();
  const head = document.getElementById('table-head');
  const btn  = document.getElementById('btn-add-row');

  if (mv.length === 0) {
    head.innerHTML = '';
    document.getElementById('table-body').innerHTML = '';
    btn.classList.add('hidden');
    return;
  }

  btn.classList.remove('hidden');
  head.innerHTML = mv.map(v =>
    `<th>${v.nome}${v.unit?' ('+v.unit+')':''}${v.calc?'<span class="auto-badge">auto</span>':''}</th>`
  ).join('') + '<th></th>';

  if (rows.length === 0) addRow(false);
  renderRows();
}

function renderRows() {
  const mv = getMedirVars();
  document.getElementById('table-body').innerHTML = rows.map((row, ri) =>
    '<tr>' + mv.map(v => {
      if (v.calc) {
        const val = v.calc(effRow(row));
        return `<td class="calc-cell"><input type="text" value="${val!==''?val:''}" readonly tabindex="-1"></td>`;
      }
      return `<td><input type="number" step="any" value="${row[v.id]!==undefined?row[v.id]:''}"
        oninput="cellIn(${ri},'${v.id}',this.value)"></td>`;
    }).join('') +
    `<td class="del-cell"><button class="btn-del" onclick="delRow(${ri})">×</button></td></tr>`
  ).join('');
}

function cellIn(ri, vid, val) {
  rows[ri][vid] = val;
  // Update calc cells in this row only
  const mv = getMedirVars();
  const e  = effRow(rows[ri]);
  const tr = document.getElementById('table-body').querySelectorAll('tr')[ri];
  if (!tr) return;
  let ci = 0;
  mv.forEach(v => {
    if (v.calc) {
      const inp = tr.querySelectorAll('td')[ci].querySelector('input');
      const val = v.calc(e);
      inp.value = val !== '' ? val : '';
    }
    ci++;
  });
  updateChart();
}

function recalcAll() {
  const mv = getMedirVars();
  const trs = document.getElementById('table-body').querySelectorAll('tr');
  rows.forEach((row, ri) => {
    const e = effRow(row);
    const tr = trs[ri];
    if (!tr) return;
    let ci = 0;
    mv.forEach(v => {
      if (v.calc) {
        const inp = tr.querySelectorAll('td')[ci].querySelector('input');
        const val = v.calc(e);
        inp.value = val !== '' ? val : '';
      }
      ci++;
    });
  });
  updateChart();
}

function addRow(render = true) {
  const newRow = {};
  formula.vars.forEach(v => { if (!v.calc && varModes[v.id]!=='fixar') newRow[v.id] = ''; });
  rows.push(newRow);
  if (render) renderRows();
}

function delRow(ri) {
  if (rows.length <= 1) {
    formula.vars.forEach(v => { if (!v.calc && varModes[v.id]!=='fixar') rows[0][v.id] = ''; });
  } else {
    rows.splice(ri, 1);
  }
  renderRows();
  updateChart();
}

// ── Chart ─────────────────────────────────────────────────────────────────────

var crosshairPlugin = {
  id: 'crosshair',
  afterDraw(ch) {
    if (ch._cx === undefined) return;
    const {ctx, chartArea:ca} = ch;
    ctx.save();
    ctx.strokeStyle = 'rgba(27,46,80,.3)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(ch._cx, ca.top);    ctx.lineTo(ch._cx, ca.bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ca.left, ch._cy);   ctx.lineTo(ca.right, ch._cy);  ctx.stroke();
    ctx.restore();
  }
};
Chart.register(crosshairPlugin);

function showChartPlaceholder(msg) {
  document.getElementById('chart-placeholder').textContent = msg;
  document.getElementById('chart-placeholder').style.display = 'flex';
  document.getElementById('chart').classList.add('hidden');
}

function initMouseListeners() {
  if (mouseListenersAdded) return;
  mouseListenersAdded = true;
  const canvas = document.getElementById('chart');
  const label  = document.getElementById('xy-label');
  canvas.addEventListener('mousemove', e => {
    if (!chart) return;
    const r  = canvas.getBoundingClientRect();
    chart._cx = e.clientX - r.left;
    chart._cy = e.clientY - r.top;
    chart.update('none');
    const items = chart.getElementsAtEventForMode(e, 'nearest', {intersect:false}, false);
    if (items.length) {
      const pt = chart.data.datasets[items[0].datasetIndex].data[items[0].index];
      const ax = document.getElementById('sel-x')?.value || 'X';
      const ay = document.getElementById('sel-y')?.value || 'Y';
      label.style.display = 'block';
      label.style.left    = (chart._cx + 12) + 'px';
      label.style.top     = Math.max(4, chart._cy - 28) + 'px';
      label.textContent   = `${ax}: ${pt.x}  ${ay}: ${pt.y}`;
    } else {
      label.style.display = 'none';
    }
  });
  canvas.addEventListener('mouseleave', () => {
    if (!chart) return;
    delete chart._cx; delete chart._cy;
    chart.update('none');
    label.style.display = 'none';
  });
}

function updateChart() {
  const axX = document.getElementById('sel-x')?.value;
  const axY = document.getElementById('sel-y')?.value;
  if (!axX || !axY || !formula) return;

  const mv   = getMedirVars();
  const xVar = formula.vars.find(v => v.id === axX);
  const yVar = formula.vars.find(v => v.id === axY);
  if (!xVar || !yVar) return;

  const points = [];
  rows.forEach(row => {
    const e    = effRow(row);
    const xVal = xVar.calc ? xVar.calc(e) : e[axX];
    const yVal = yVar.calc ? yVar.calc(e) : e[axY];
    if (num(xVal) && num(yVal)) points.push({ x: +xVal, y: +yVal });
  });

  const xLabel = `${xVar.nome}${xVar.unit?' ('+xVar.unit+')':''}`;
  const yLabel = `${yVar.nome}${yVar.unit?' ('+yVar.unit+')':''}`;
  const canvas = document.getElementById('chart');

  if (points.length === 0) {
    showChartPlaceholder('Preencha dados na tabela para ver o gráfico');
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  document.getElementById('chart-placeholder').style.display = 'none';
  canvas.classList.remove('hidden');
  initMouseListeners();

  if (chart) {
    chart.data.datasets[0].data          = points;
    chart.options.scales.x.title.text    = xLabel;
    chart.options.scales.y.title.text    = yLabel;
    chart.update();
    return;
  }

  chart = new Chart(canvas, {
    type: 'scatter',
    data: {
      datasets: [{
        data:            points,
        borderColor:     '#1B2E50',
        backgroundColor: '#007575',
        pointRadius:     5,
        pointHoverRadius:7,
        showLine:        true,
        tension:         0.3,
        borderWidth:     2,
      }]
    },
    options: {
      animation:           { duration: 150 },
      responsive:          true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'nearest', intersect: false,
          callbacks: { label: ctx => `${xLabel}: ${ctx.parsed.x}  ${yLabel}: ${ctx.parsed.y}` }
        }
      },
      scales: {
        x: { title: { display:true, text:xLabel, font:{size:11,weight:'bold'}, color:'#556070' },
             grid: { color:'#e8eaf0' } },
        y: { title: { display:true, text:yLabel, font:{size:11,weight:'bold'}, color:'#556070' },
             grid: { color:'#e8eaf0' } },
      }
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────

buildFormulaGrid();
</script>
